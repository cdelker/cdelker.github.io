<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ziamath MathML Demo</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.7.2/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.7.2/core.js"></script>
  </head>
<body>
<div class="top">
  <h1>Ziamath MathML Rendering Demo</h1>
  <h3>Enter a MathML expression</h3>
</div>

<div class="content">
<div class="inputgrid">
    <div class="grid-box">
        <label for="expression">MathML Expression:</label>
    </div>
    <div class="grid-box">
        <label for="mathfont">Font:</label>
    </div>
    <div class="grid-box"></div>
    <div class="grid-box">
    <div id="mathml">
      <textarea rows="10" id="expression" name="expression">&lt;math&gt;&#13;
   &lt;msqrt&gt;&lt;mi&gt;x&lt;/mi&gt;&lt;/msqrt&gt;&#13;
&lt;/math&gt;&#13;</textarea>
    <input hidden type="checkbox" name="inline" id="inline" type="checkbox">

    </div>
    </div>
    <div class="grid-box">
      <select id="mathfont" name="mathfont">
        <option value="stix2">Stix2</option>
        <option value="asana">Asana-Math</option>
        <option value="concrete">Concrete-Math</option>
        <option value="dejavu">DejaVu Math Tex Gyre</option>
        <option value="erewhon">Erewhon-Math</option>
        <option value="fira">FiraMath</option>
        <option value="garamond">Garamond-Math</option>
        <option value="lete">Lete Sans Math</option>
        <option value="liber">LibertinusMath</option>
      </select>          
    </div>
</div>

      <br><br>
      <div id="loading"><h2>Loading...</h2></div>
      <div id="mathout"></div>
      <br><br>    
   <div>
      <button type="button" id="savebutton">Download SVG</button>
   </div>
      </div>
      <br><br>    
<footer>
       <p><a href="ziamath.html">LaTeX Version</a></p>
       <p>Made with <a href="https://ziamath.readthedocs.io">Ziamath</a> and <a href="https://pyscript.net/">PyScript</a></p>
</footer>

<script type="py" src="src/zmath.py" config="zmath_pyscript.json"></script>
</body>
</html>
