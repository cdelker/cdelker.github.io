<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Logic Circuits</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.7.2/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.7.2/core.js"></script>
</head>
<body>
<div class="top">
  <h1>Logic Gates by Schemdraw</h1>
  <h3>Enter a logic expression</h3>
</div>

<div class="content">
<div class="logicgrid">
    <div class="grid-box">
        Expression
    </div>
    <div class="grid-box">
        Gate Height
    </div>
    <div class="grid-box">
      <input type="text" id="expression" name="expression" value="a or b"> =
      <input type="text" id="outlabel" name="outlabel" value="Q">
    </div>
    <div class="grid-box">
      <input type="number" name="height" id="height"
            min=".25" max="4" step=".25" value=".75">
    </div>
</div>
<br><br>

<div id="loading"><h2>Loading...</h2></div>
<div id="schematic"></div>
<br><br>

<div>
    <button type="button" id="savebutton">Download Image</button>
</div>
</div>
  <br><br>    
<footer>
   <p>Made with <a href="https://schemdraw.readthedocs.io">Schemdraw</a> and <a href="https://pyscript.net/">PyScript</a></p>
</footer>

<script type="py", src="src/logic.py" config='{"packages": ["whl/schemdraw-0.24a0-py3-none-any.whl",
 "whl/ziamath-0.13-py3-none-any.whl",
 "whl/ziafont-0.11-py3-none-any.whl",
 "pyparsing"
]}'></script>

</body>
</html>
